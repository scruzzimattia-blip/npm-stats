name: CI
on: [push]

jobs:
  build-and-push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        
      - name: Login to Gitea Registry
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login 192.168.1.41:3000 --username "${{ github.actor }}" --password-stdin
          
      - name: Build and Push UI
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG="192.168.1.41:3000/${REPO_OWNER}/${REPO_NAME}/npm-ui:latest"
          docker build -t $TAG .
          docker push $TAG
          
      - name: Build and Push Worker
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG="192.168.1.41:3000/${REPO_OWNER}/${REPO_NAME}/npm-worker:latest"
          docker build -t $TAG .
          docker push $TAG
          
      - name: Build and Push AI
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          TAG="192.168.1.41:3000/${REPO_OWNER}/${REPO_NAME}/npm-ai:latest"
          docker build -t $TAG .
          docker push $TAG
