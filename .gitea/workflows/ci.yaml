name: CI
on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install uv
          uv sync --frozen

      - name: Run linting
        run: |
          uv run ruff check src/
          
      - name: Run tests
        run: |
          # Note: skipping DB tests in CI if no local postgres is available
          # but we keep the structure for future use
          uv run pytest tests/ -v
