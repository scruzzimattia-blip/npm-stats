name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install uv and sync
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          source $HOME/.cargo/env
          uv sync --frozen

      - name: Run linting
        run: |
          source $HOME/.cargo/env
          uv run ruff check src/

      - name: Run tests
        run: |
          source $HOME/.cargo/env
          # Note: skipping DB tests in CI if no local postgres is available
          # but we keep the structure for future use
          uv run pytest tests/ -v
